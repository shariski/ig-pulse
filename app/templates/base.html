<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}IG Pulse{% endblock %}</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500..700;1,500..700&family=Plus+Jakarta+Sans:ital,wght@0,500..800;1,500..800&family=JetBrains+Mono:wght@500..700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/app.css" />
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>

  <!-- Apply persisted theme before first paint to avoid a flash. -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('ig-pulse-theme');
        if (t) document.documentElement.setAttribute('data-theme', t);
      } catch (e) {}
    })();
  </script>
</head>
<body>
  {% block content %}{% endblock %}

  <!-- Theme toggle: fixed bottom-right per design-system (not in sidebar). -->
  <button class="theme-toggle" id="themeBtn" type="button" aria-label="Ganti tema" onclick="toggleTheme()">☾</button>
  <script>
    function toggleTheme() {
      var html = document.documentElement;
      var next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      try { localStorage.setItem('ig-pulse-theme', next); } catch (e) {}
      document.getElementById('themeBtn').textContent = next === 'dark' ? '☾' : '☀';
    }
    (function () {
      var b = document.getElementById('themeBtn');
      if (b) b.textContent = document.documentElement.getAttribute('data-theme') === 'dark' ? '☾' : '☀';
    })();
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
