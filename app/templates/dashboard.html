{% extends "base.html" %}

{% block title %}Dasbor — IG Pulse{% endblock %}

{% block content %}

<!-- SCOPE SELECTOR — pilih cakupan: satu post, rentang waktu, atau semua.
     Submit via HTMX memuat ulang #analysis-grid (partials/grid.html). -->
<section aria-label="Pilih cakupan analisis">
  <form hx-post="/scope" hx-target="#analysis-grid" hx-swap="innerHTML" hx-indicator="#scope-spinner">
    <fieldset>
      <legend>Cakupan Analisis</legend>
      <div style="display:flex;gap:1rem;flex-wrap:wrap;align-items:flex-end;">
        <label style="flex:0 0 auto;">
          Jenis cakupan
          <select name="scope_type" id="scope_type">
            <option value="all" selected>Semua Post</option>
            <option value="post">Satu Post</option>
            <option value="period">Rentang Waktu</option>
          </select>
        </label>

        <label id="field-post" style="flex:1 1 240px;display:none;">
          Pilih Post
          <select name="post_id">
            <option value="">— pilih post —</option>
            {% for p in posts %}
              <option value="{{ p.id }}">
                {{ p.timestamp[:10] }} · {{ (p.caption or "(tanpa caption)")[:48] }}
                ({{ p.comment_count or 0 }} komentar)
              </option>
            {% endfor %}
          </select>
        </label>

        <label id="field-date-from" style="flex:0 0 auto;display:none;">
          Dari <input type="date" name="date_from" />
        </label>
        <label id="field-date-to" style="flex:0 0 auto;display:none;">
          Sampai <input type="date" name="date_to" />
        </label>

        <button type="submit" style="flex:0 0 auto;">Mulai Analisis</button>
        <span id="scope-spinner" class="htmx-indicator" aria-label="Memuat...">⏳</span>
      </div>
    </fieldset>
  </form>
</section>

<!-- ANALYSIS GRID — 4 kartu, dimuat independen via HTMX (grid.html). -->
<div id="analysis-grid" style="display:grid;gap:1.5rem;margin-top:1.5rem;">
  {% include "partials/grid.html" %}
</div>

<!-- Modal target untuk tombol Ekspor (semua kartu) -->
<div id="export-modal" aria-live="polite"></div>

{% endblock %}

{% block scripts %}
<script>
  // Minimal inline JS (B6): toggle scope sub-fields. Re-bind after HTMX swaps too.
  (function () {
    function bind() {
      var t = document.getElementById('scope_type');
      if (!t || t.dataset.bound) return;
      t.dataset.bound = '1';
      function toggle() {
        var v = t.value;
        var post = document.getElementById('field-post');
        var from = document.getElementById('field-date-from');
        var to = document.getElementById('field-date-to');
        if (post) post.style.display = v === 'post' ? '' : 'none';
        if (from) from.style.display = v === 'period' ? '' : 'none';
        if (to) to.style.display = v === 'period' ? '' : 'none';
      }
      t.addEventListener('change', toggle);
      toggle();
    }
    bind();
    document.body.addEventListener('htmx:afterSwap', bind);
  })();
</script>
{% endblock %}
